server {
    listen 80;
    server_name _; # Change this to your domain or VPS IP later

    root /root/emiumuagi/frontend/dist; # Path where GitHub Actions uploads your frontend
    index index.html;

    # 1. Serve Frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to the Go API Gateway (port 8000)
    location /api/ {
        # Note: If your gateway is on a different server, change localhost to its IP
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Increase upload limit if you allow images/files
    client_max_body_size 50M;

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
